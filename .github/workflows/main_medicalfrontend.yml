name: Build and deploy frontend to Azure Web App - medicalfrontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: medicalfrontend-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AZURE_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZUREAPPSERVICE_PUBLISHPROFILE || secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5B03EFCDA06B4CD2803FC8F20F6BBD36 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify build output
        run: ls -la dist

      - name: Validate Azure publish profile secret
        run: |
          if [ -z "$AZURE_PUBLISH_PROFILE" ]; then
            echo "Missing publish profile secret. Set AZURE_WEBAPP_PUBLISH_PROFILE (or AZUREAPPSERVICE_PUBLISHPROFILE) in frontend repo secrets."
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: medicalfrontend
          slot-name: Production
          publish-profile: ${{ env.AZURE_PUBLISH_PROFILE }}
          package: ./dist
